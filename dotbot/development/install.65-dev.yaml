- link:
    ~/.config/mise/config.toml:
      path: config/mise/config.toml
      force: true
      create: true
    ~/.codex/AGENTS.md:
      path: config/ai/codex/AGENTS.md
      force: true
    ~/.codex/keybindings.json:
      path: config/ai/codex/keybindings.json
      force: true
    ~/.codex/agents:
      path: config/ai/codex/agents
      force: true
    ~/.codex/prompts:
      path: config/ai/codex/prompts
      force: true
    ~/.codex/git-hooks:
      path: config/ai/codex/git-hooks
      force: true
    ~/.agents:
      path: config/ai/agents
      force: true
- shell:
    - description: Initialize Codex config ...
      command: mkdir -p ~/.codex && cp -n config/ai/codex/config.toml ~/.codex/config.toml || true
      quiet: true
      stdout: false
      stderr: true
    - description: Install mise ...
      command: |
        if ! which mise &> /dev/null; then
        if [ "$(uname)" = "Darwin" ]; then
        brew install mise
        else
        sudo GHPKG_INSTALL_DIR=/usr/local/bin ~/.local/bin/ghpkg jdx/mise
        fi
        fi
      quiet: true
      stdout: false
      stderr: true
    - description: Install mise runtimes ...
      command: |
        . ./script/load-mise.sh
        mise install
      quiet: true
      stdout: false
      stderr: true
    - description: Install npm packages ...
      command: |
        . ./script/load-mise.sh
        npm i -g yarn git-cz

        if [ "$(uname)" != "Darwin" ]; then
        npm i -g @google/gemini-cli @openai/codex @anthropic-ai/claude-code
        fi
      quiet: true
      stdout: false
      stderr: true
    - description: Install python packages ...
      command: |
        . ./script/load-mise.sh
        pip install ydcv uv mycli
      quiet: true
      stdout: false
      stderr: true
    - description: Refresh mise shims ...
      command: |
        . ./script/load-mise.sh
        mise reshim
      quiet: true
      stdout: false
      stderr: true
    - description: Configure Codex default plugins ...
      command: >
        ./scripts/install-codex-plugins.py
        superpowers
        build-macos-apps
        build-web-apps
        build-ios-apps
        expo
      quiet: true
      stdout: false
      stderr: true
    - description: Enable Codex bundled plugins ...
      command: >
        ./scripts/enable-codex-bundled-plugins.py
        browser
        browser-use
        computer-use
        chrome
      quiet: true
      stdout: false
      stderr: true
