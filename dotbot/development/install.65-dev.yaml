- link:
    ~/.asdfrc:
      path: config/asdf/asdfrc
      force: true
- shell:
  - description: Install asdf ...
    command: |
      if ! which asdf &> /dev/null; then
      if [ "$(uname)" = "Darwin" ]; then
      brew install asdf
      else
      sudo GHPKG_INSTALL_DIR=/usr/local/bin ~/.local/bin/ghpkg asdf-vm/asdf
      fi
      fi
  - description: Add golang plugin ...
    command: |
      . ./script/load-asdf.sh
      asdf plugin add golang https://github.com/asdf-community/asdf-golang.git
      asdf plugin add nodejs https://github.com/asdf-vm/asdf-nodejs.git
      asdf plugin add python https://github.com/danhper/asdf-python.git
      asdf plugin add bun https://github.com/cometkim/asdf-bun.git
    stdout: true
    stderr: true
  - description: Install tools ...
    command: |
      . ./script/load-asdf.sh
      asdf install golang 1.25.1
      asdf set -u golang 1.25.1

      asdf install python 3.13.5
      asdf set -u python 3.13.5

      asdf install nodejs 24.11.0
      asdf set -u nodejs 24.11.0

      asdf install bun 1.3.2
      asdf set -u bun 1.3.2

    stdout: true
    stderr: true
  - description: Install npm packages ...
    command: |
      . ./script/load-asdf.sh
      npm i -g yarn git-cz @google/gemini-cli @openai/codex @anthropic-ai/claude-code claude-code-router
    stdout: true
    stderr: true
  - description: Install RTK CLI on non-macOS ...
    command: |
      if [ "$(uname)" != "Darwin" ] && ! which rtk &> /dev/null; then
      sudo GHPKG_INSTALL_DIR=/usr/local/bin ~/.local/bin/ghpkg rtk-ai/rtk
      fi
    stdout: true
    stderr: true
  - description: Install python packages ...
    command: |
      . ./script/load-asdf.sh
      pip install ydcv uv mycli
    stdout: true
    stderr: true
  - description: Asdf reshim ...
    command: |
      . ./script/load-asdf.sh
      asdf reshim
    stdout: true
    stderr: true
  - command: ./config/scripts/ai-sync || true
    description: Installing shared AI control plane ...
    quiet: false
    stdout: true
    stderr: true
  - description: Configure Codex default plugins ...
    command: >
      ./config/scripts/codex-install-plugins
      superpowers
      build-macos-apps
      build-web-apps
      build-ios-apps
      expo
      coderabbit
    quiet: true
    stdout: true
    stderr: true
 
