approval_policy = "never"
disable_response_storage = true
model = "gpt-5.5"
model_provider = "openai"
model_reasoning_effort = "high"
network_access = "enabled"
persistent_instructions = "Follow project AGENTS.md guidelines. Use available MCP servers when they can help."
plan_mode_reasoning_effort = "xhigh"
review_model = "gpt-5.4"
sandbox_mode = "danger-full-access"
web_search = "live"

approvals_reviewer = "user"

personality = "pragmatic"

[model_providers.9router]
base_url = "https://9router.monlor.com/v1"
name = "9router"
requires_openai_auth = true
wire_api = "responses"

[model_providers.sub2api]
name = "sub2api"
base_url = "https://devai.bytevela.com"
wire_api = "responses"
requires_openai_auth = true

[agents]
max_depth = 1
max_threads = 6

[agents.docs_researcher]
config_file = "agents/docs-researcher.toml"
description = "Documentation specialist that verifies APIs, framework behavior, and release notes."

[agents.explorer]
config_file = "agents/explorer.toml"
description = "Read-only codebase explorer for gathering evidence before changes are proposed."

[agents.reviewer]
config_file = "agents/reviewer.toml"
description = "PR reviewer focused on correctness, security, and missing tests."

[features]
multi_agent = true
memories = true
terminal_resize_reflow = true
goals = true
prevent_idle_sleep = true
remote_connections = true
js_repl = false
hooks = true
chronicle = true
mentions_v2 = true

[marketplaces.monlor-marketplace]
source_type = "git"
source = "https://github.com/monlor/codex-marketplace"

[marketplaces.stitch-skills]
source_type = "git"
source = "https://github.com/google-labs-code/stitch-skills.git"
ref = "main"
sparse_paths = [".agents/plugins", "plugins/stitch-design", "plugins/stitch-build", "plugins/stitch-utilities"]

[mcp_servers.stitch]
url = "https://stitch.googleapis.com/mcp"
env_http_headers = {
  "X-Goog-Api-Key" = "STITCH_API_KEY"
}

[mcp_servers.mcphub]
url = "https://mcp.monlor.com/mcp/codex"

[plugins."remotion@openai-curated"]
enabled = true

[plugins."openai-developers@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."caveman@monlor-marketplace"]
enabled = true

[plugins."rtk@monlor-marketplace"]
enabled = true

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[shell_environment_policy]
inherit = "core"

[tui.model_availability_nux]
"gpt-5.5" = 4

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = false

[desktop]
conversationDetailMode = "STEPS_COMMANDS"
ambient-suggestions-enabled = true
keepRemoteControlAwakeWhilePluggedIn = true
git-show-sidebar-pr-icons = true
preventSleepWhileRunning = true
reviewDelivery = "detached"

[desktop.open-in-target-preferences]
global = "zed"

[plugins."codegraph@monlor-marketplace"]
enabled = true

[plugins."build-macos-apps@openai-curated"]
enabled = true

[plugins."build-web-apps@openai-curated"]
enabled = true

[plugins."build-ios-apps@openai-curated"]
enabled = true

[plugins."expo@openai-curated"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."stripe@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."supabase@openai-curated"]
enabled = true

[plugins."stitch-design@stitch-skills"]
enabled = true

[plugins."stitch-utilities@stitch-skills"]
enabled = true

[plugins."stitch-build@stitch-skills"]
enabled = true

[plugins."openviking-memory-no-mcp@monlor-marketplace"]
enabled = true

[plugins."linear@openai-curated"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."cloudflare@openai-curated"]
enabled = true
